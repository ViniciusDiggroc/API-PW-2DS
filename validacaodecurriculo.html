<!DOCTYPE html>
<html>

<head>
    <title>Trabalho API - Currículo</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link href="css/estilo.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <!-- sticky-top -> fixo no topo com espaço com conteúdo abaixo)-->
        <a class="navbar-brand" href="index.html">Exercícios de PW</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Alterna navegação">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse " id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item ">
                    <a class="nav-link" href="index.html" title="Página inicial"><i class="bi bi-house"></i>
                        Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="piadas.html" title="entre em contato"><i
                            class="bi bi-input-cursor-text"></i> Piadas</a>
                </li>
                <li class="nav-item active">
                    <a class="nav-link" href="validacaodecurriculo.html" title="entre em contato"><i
                            class="bi bi-input-cursor-text"></i>
                        Currículo</a>
                </li>


    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg p-4">
                    <form class="cmxform" id="formExemplo" method="get" action="" novalidate>
                        <fieldset>

                            <!--https://jqueryvalidation.org/documentation/-->
                            <div class="form-row">
                                <div class="form-group col-md-6">
                                    <label for="txtnome">Nome completo</label>
                                    <input type="text" class="form-control" id="txtnome" name="txtnome"
                                        placeholder="Digite seu nome" required minlength="5">
                                </div>

                                <div class="form-group col-md-6">
                                    <label for="txtemail">E-mail</label>
                                    <input type="email" class="form-control" id="txtemail" name="txtemail"
                                        placeholder="Digite seu email" required>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group col-md-6">
                                    <label for="txtidade">Idade</label>
                                    <input type="number" class="form-control" id="txtidade" name="txtidade"
                                        placeholder="Digite sua idade" min="18" max="65" required>
                                </div>

                                <div class="form-group col-md-6">
                                    <label for="txttelefone">Telefone</label>
                                    <input type="text" class="form-control" id="txttelefone" name="txttelefone"
                                        placeholder="Digite seu telefone" required>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group col-md-6">
                                    <label for="txtcpf">CPF</label>
                                    <input type="text" class="form-control" id="txtcpf" name="txtcpf"
                                        placeholder="Digite seu CPF" required>
                                </div>

                                <div class="form-group col-md-6">
                                    <label for="txtarea">Área de Interesse</label>
                                    <select class="form-control" id="txtarea" name="txtarea" required>
                                        <option value="">Selecione</option>
                                        <option>Programação</option>
                                        <option>Design</option>
                                        <option>Marketing</option>
                                        <option>Banco de Dados</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="txtexperiencia">Experiência</label>
                                <textarea class="form-control" id="txtexperiencia" name="txtexperiencia" required
                                    minlength="20" maxlength="50"></textarea>
                            </div>

                            <div class="form-row">
                                <div class="form-group col-md-6">
                                    <label for="txtsenha">Senha</label>
                                    <input type="password" class="form-control" id="txtsenha" name="txtsenha"
                                        placeholder="Digite uma senha de até 6 dígitos" required minlength="6">
                                </div>

                                <div class="form-group col-md-6">
                                    <label for="txtconfirmar">Confirmar Senha</label>
                                    <input type="password" class="form-control" id="txtconfirmar" name="txtconfirmar"
                                        placeholder="Digite novamente a senha" minlength="6" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-success btn-block">
                                <i class="bi bi-send"></i> Enviar Currículo
                            </button>

                </div>
                </fieldset>
                </form>
            </div>
        </div>
    </div>


    <!-- Scripts -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>

    <!--validação-->
    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/additional-methods.min.js"></script>
    <script src="js/curriculo.js"></script>

</body>

</html>
